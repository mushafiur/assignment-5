<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind & daisyUI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style css  -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body class="min-h-screen flex items-center">

    <!-- login page model  -->

    <section id="login-sec" class="w-[512px] mx-auto my-10 p-7 shadow-sm rounded-2xl space-y-8">

        <div class="login_logo text-center space-y-2">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            <p>Sign in to manage your issues</p>
        </div>


        <!-- login form  -->

        <fieldset class="fieldset mx-auto bg-base-200 border-base-300 rounded-box w-xs border p-4">

            <label class="label">Username</label>
            <input id="username" type="text" class="input" placeholder="Enter Username" />
            <p class="text-primary">Default: admin</p>

            <label class="label">Password</label>
            <input id="password" type="password" class="input" placeholder="Password" />
            <p class="text-primary">Default: admin123</p>

            <button onclick="handleLogin()" class="btn btn-primary mt-4">Login</button>
        </fieldset>

        <div class="divider w-xs mx-auto">OR</div>

        <div class="text-center space-y-2">
            <p>Demo Credentials:</p>
            <div class="w-xs mx-auto bg-base-200 p-3 rounded-2xl">
                <p><span>Username:</span> admin</p>
                <p><span>Password:</span> admin123</p>
            </div>
        </div>


    </section>



    <!-- js links  -->
    <script src="./script/script.js"></script>
</body>

</html>
